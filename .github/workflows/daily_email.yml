# .github/workflows/daily_email.yml
#
# Sends daily research briefing via Gmail SMTP.
#
# SETUP REQUIRED:
#   Go to GitHub repo → Settings → Secrets and variables → Actions
#   Add these secrets:
#     ANTHROPIC_API_KEY  → from console.anthropic.com
#     XAI_API_KEY        → from x.ai
#     FINNHUB_API_KEY    → from finnhub.io
#     GMAIL_ADDRESS      → your Gmail address
#     GMAIL_APP_PASSWORD → 16-char app password from Google

name: Daily Research Brief

on:
  schedule:
    - cron: '10 6 * * 1-5'   # 6:10 UTC ≈ 2:10am EDT → arrives ~3am
  workflow_dispatch:           # manual trigger button

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python run_briefing.py
